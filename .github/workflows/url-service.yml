name: URL Service CI/CD

on:
  push:
    branches: [ "main" ] # Runs on every push to main branch
    paths:
      - 'src/Services/URLService/**' # Only runs if files in this service change

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0

    - name: Restore dependencies
      run: dotnet restore src/Services/URLService/URLService.csproj

    - name: Build Service
      run: dotnet build src/Services/URLService/URLService.csproj --no-restore

    - name: Run Unit Tests
      run: dotnet test src/Services/URLService/URLService.Tests/ --no-build --verbosity normal

    # Optional: Build and push Docker image to Docker Hub
    # - name: Docker Login
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKER_HUB_USERNAME }}
    #     password: ${{ secrets.DOCKER_HUB_TOKEN }}